    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">

    <title>University Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register</p>
    <hr>
    <form id = "form1" action="">
        <h2 id="prsnl">Personal Details</h2>
        <label id="tbl" for="fname">First Name:-</label>
        <input type="text" placeholder="e.g. Sohaib" name="fname" id="fname" required>
        <br>
        <label for="lname">Last Name:-</label>
        <input type="text" placeholder="e.g Rashid"name="lname" id="lname" required>
        <br>
        <label for="dob">Date Of Birth: </label>
        <input type="date" name="dob" id="dob"required>
        <br>
        <p>Gender:- </p>
        
        <label for="male">Male</label>
        <input type="radio" name = "gender" id="male" value="male" required> <br>
        <label for="fm">Female</label>
        <input type="radio" name="gender" id="fm" value="fmale" > <br>
        <label for="ot">Other</label>
        <input type="radio" name ="gender" id="ot" value="other" >
        <br>
        <h2>Upload Your Photo</h2>
        <input type="file" name="file" required>
        <hr>
        <h2>Contact Information</h2>
        <label for="email">Email Address:- </label>
        <input type="text" name="email" id="email" required>
        <br>
        <label for="tel">Phone Number:-</label>
        <input type="tel" placeholder="9455593766" name="tel" id="tel" required>
        <br>
        <label for="mail">Mailing Address:-</label>
        <textarea name="address" id="mail" placeholder="Street No. 123, Example Colony, City, State, 208009" required></textarea>
        <hr>
        <h2>Academic Information</h2>
        <label for="course">Select Your Course<label>
        <select name="course" id="course" required>
            <option value="">SELECT OPTION</option>
            <option value="CS">CS</option>
            <option value="CSE">CSE</option>
            <option value="ME">ME</option>
            <option value="AI">AI/ML</option>
            <option value="DS">DS</option>
            <option value="IT">IT</option>
            <option value="EE">EE</option>
        </select>
        <br>
        <p>Extracurricular Intersts</p>
        <br>
        <label for="Sports">Sports</label>
        <input type="checkbox" name="Intersts" id="Sports">
        <br>
        <label for="Music & Arts">Music & Arts</label>
        <input type="checkbox" name="Intersts" id="Music & Arts">
        <br>
        <label for="Technology Clubs">Technology Clubs</label>
        <input type="checkbox" name="Intersts" id="Technology Clubs">
        <br>
        <label for="Volunteering">Volunteering</label>
        <input type="checkbox" name="Intersts" id="Volunteering">
        <br>
        <br>
        <hr>
        <h2>Create Your Account</h2>
        <br>
        <label for="passwd">Create a Password</label>
        <input type="password" name="passwd" id="passwd" required>
        <br>
        <label for="q">Security Question:-</label>
        <select name="q" id="q">
            <option value="What was Your first pet's name ?">What was Your first pet's name ?</option>
            <option value="What was Your first school name ?">What was Your first school name ?</option>
            <option value="What was the name of Your first Teacher name ? ">What was the name of Your first Teacher name ?</option>
            <option value="What is your nickname">What is your nickname</option>
        </select>
        <br>
        <label for="ans">Security Answer:-</label>
        <input type="text"name="ans" id="ans">
        <br>
        <label for="terms">I agree the Terms and Conditions.</label>
        <input type="checkbox" name="terms" id="terms" required>


        <br>
        <br>
       <button class="pp">Submit</button>
       <button class="pp">Reset</button>

        
    </form>
