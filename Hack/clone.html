<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Food Delivery App Card · Swiggy/Zomato UI</title>
    <!-- Font Awesome for star icons & general icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f3f5f7 0%, #eaeef3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* main card – glassmorphism + soft shadow */
        .food-card {
            max-width: 360px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.15), 0 10px 15px -6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(2px);
        }

        /* Hover effect — subtle lift + deeper shadow + border glow */
        .food-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 50px -12px rgba(0, 0, 0, 0.25), 0 15px 25px -8px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 120, 0, 0.2);
        }

        /* image container – top */
        .card-image {
            width: 100%;
            height: 200px;
            background: #f0f2f5;
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .food-card:hover .card-image img {
            transform: scale(1.04);
        }

        /* cuisine badge (optional but adds flavor) */
        .card-image .cuisine-tag {
            position: absolute;
            bottom: 12px;
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 4px 14px;
            border-radius: 40px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        /* card content */
        .card-content {
            padding: 1.2rem 1.2rem 1.4rem;
        }

        /* restaurant name + cuisine inline */
        .restaurant-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .restaurant-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #1e1e2a;
            line-height: 1.2;
        }

        .cuisine-type {
            font-size: 0.75rem;
            font-weight: 500;
            color: #6b7280;
            background: #f0f3f7;
            padding: 4px 12px;
            border-radius: 30px;
            letter-spacing: 0.2px;
            white-space: nowrap;
            margin-left: 8px;
        }

        /* rating + delivery time row */
        .rating-delivery {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 8px 0 16px 0;
        }

        .rating {
            display: flex;
            align-items: center;
            background: #f9fafc;
            padding: 5px 12px 5px 10px;
            border-radius: 40px;
            gap: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #2d2f3a;
            border: 1px solid #e9edf2;
        }

        .rating i {
            color: #fbbf24; /* gold star */
            font-size: 0.85rem;
            margin-right: 2px;
        }

        .rating .stars {
            display: flex;
            align-items: center;
            gap: 1px;
        }

        .delivery-time {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            padding: 5px 14px 5px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1f2937;
            border: 1px solid #e2e8f0;
        }

        .delivery-time i {
            color: #e67e22;
            font-size: 0.8rem;
        }

        /* order now button */
        .order-btn {
            display: block;
            width: 100%;
            background:#e63946 ;
            border: none;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            color: white;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 18px -6px rgba(230, 57, 70, 0.35);
            transition: all 0.2s ease;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .order-btn i {
            margin-right: 8px;
            font-size: 0.95rem;
        }

        .order-btn:hover {
            background: #e6730f;
            transform: scale(1.01);
            box-shadow: 0 10px 22px -6px rgba(252, 128, 25, 0.5);
        }

        .order-btn:active {
            transform: scale(0.97);
            background: #d4660a;
        }

        /* small extra — like location or distance (optional) */
        .card-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            font-size: 0.7rem;
            color: #8b95a5;
            letter-spacing: 0.2px;
            border-top: 1px solid #f1f4f8;
            padding-top: 10px;
        }

        .card-footer i {
            margin-right: 4px;
            color: #a0aec0;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .food-card {
                max-width: 100%;
                border-radius: 24px;
            }
            .card-image {
                height: 170px;
            }
            .restaurant-name {
                font-size: 1.25rem;
            }
            .cuisine-type {
                font-size: 0.7rem;
                padding: 3px 10px;
            }
            .rating-delivery {
                gap: 8px;
                margin: 6px 0 14px 0;
            }
            .rating, .delivery-time {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            .order-btn {
                font-size: 0.95rem;
                padding: 13px 0;
            }
            .card-content {
                padding: 1rem;
            }
            .card-image .cuisine-tag {
                font-size: 0.6rem;
                padding: 3px 12px;
                bottom: 10px;
                left: 12px;
            }
        }

        @media (max-width: 380px) {
            .restaurant-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .cuisine-type {
                margin-left: 0;
            }
            .rating-delivery {
                flex-wrap: wrap;
            }
        }

        /* small extra: hover state on card image also */
        .food-card:hover .card-image .cuisine-tag {
            background: rgba(0, 0, 0, 0.75);
        }

        /* custom star fill (we use font awesome) */
        .fa-star, .fa-star-half-alt {
            color: #fbbf24;
        }
        .fa-star-half-alt {
            opacity: 0.9;
        }
        .rating .stars .fa-star:last-child {
            color: #e4e7ed; /* empty star */
        }
        .rating .stars .fa-star:last-child.fa-star {
            color: #fbbf24; /* override: we want full star for demo */
        }
        /* we manually set stars to full for demo – but we use .fa-star for all */
        .stars i {
            color: #fbbf24;
        }
        .stars .fa-star-half-alt {
            color: #fbbf24;
        }
        .stars .fa-star-o {
            color: #d1d5db;
        }
        /* we use only solid & half stars for demo */
    </style>
</head>
<body>
    <!-- Food Card – Swiggy/Zomato style clone -->
    <div class="food-card">
        <!-- image top -->
        <div class="card-image">
            <img 
                src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&h=400&fit=crop&crop=center&auto=format" 
                alt="Delicious pizza" 
                loading="lazy"
            >
            <span class="cuisine-tag"><i class="fas fa-utensils" style="margin-right: 6px;"></i>Italian • Fast</span>
        </div>

        <!-- content -->
        <div class="card-content">
            <!-- Restaurant name + cuisine type inline -->
            <div class="restaurant-header">
                <span class="restaurant-name">Pizza Paradiso</span>
                <span class="cuisine-type"><i class="fas fa-pizza-slice" style="margin-right: 4px;"></i>Italian</span>
            </div>

            <!-- Rating + Delivery time -->
            <div class="rating-delivery">
                <div class="rating">
                    <i class="fas fa-star" style="color: #fbbf24;"></i>
                    <span class="stars">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star-half-alt"></i>
                    </span>
                    <span style="font-weight: 400; margin-left: 4px; color: #4b5563;">4.5</span>
                </div>
                <div class="delivery-time">
                    <i class="fas fa-motorcycle"></i>
                    <span>20-30 min</span>
                </div>
            </div>

            <!-- Order Now button -->
            <button class="order-btn" onclick="alert('✅ Order placed! (demo)')">
                <i class="fas fa-shopping-bag"></i> Order Now
            </button>

            <!-- subtle footer (extra) -->
            <div class="card-footer">
                <span><i class="fas fa-map-pin"></i> 2.3 km</span>
                <span style="margin-left: 16px;"><i class="far fa-clock"></i> opens 11:00</span>
            </div>
        </div>
    </div>

    <!-- additional note: mobile responsive tested -->
    <script>
        // (Optional) small interactive feedback for button 
        // Already using inline onclick, but we can keep console silent.
        console.log('🍕 Food Card UI clone — Swiggy/Zomato style');
    </script>
</body>
</html>
