<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            font-family: system-ui, sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            flex-wrap: wrap;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(255, 255, 255, 0.92);
            padding: 10px 10px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2b7111;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #2d3142;
            font-weight: 500;
        }

        /* BUTTON */
        .btn-primary {
            background: #2b2d42;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px -6px rgba(43, 45, 66, 0.2);
        }

        .btn-primary:hover {
            background: #1e2235;
            transform: translateY(-2px);
            box-shadow: 0 14px 28px -8px rgba(43, 45, 66, 0.3);
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">MySite</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">More</a></li>
            </ul>
            <button class="btn-primary">Get Started</button>
        </div>
    </nav>
</body>
</html>
