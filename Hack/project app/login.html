<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSR Login</title>


    <style>
        .main{
            display: flex;
            justify-content: center;
            padding-top: 190px;
            height: 400px;
            background-color: rgb(53, 49, 60);
            font-size: x-large;
            font-weight: 400;
            color: aliceblue;
        }
        .main2{
            height: 200px;
            width: 200px;
            padding-bottom: 200px;
            background-color: aqua;
        }
        .btnl{
            background-color: black;
            color: aliceblue;
            font-size: larger;
            font-weight: 700;
            border: none;
            padding: 18px 10px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 14px 28px -8px rgb(131, 5, 250);
        }
        .btnl:hover{
            background:#2d3142;
            transform: translate(4px);
            box-shadow: 0 14px 28px -8px rgba(43, 45, 66, 0.3);
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="main2">
            <div class="input">
                <div class="namel">
                <label for="name">Name</label>
                <input type="text" class="name" id="name" required placeholder="Sohaib Rashid">
                </div>

                <div class="Phonel">
                    <label for="phone">Phone No. : </label>
                    <input type="number" required placeholder="9988907271">
                </div>
                <div class="emaill"> 
                    <label for="email">E-mail</label>
                    <input type="text" class="email" placeholder="abc@email.com" required>
                </div>

                <div class="passl">
                    <label for="pass">Password</label>
                    <input type="password" class="pass" required >
                </div>
                <br>
                <button class="btnl">Sing Up</button>
            </div>
            

        </div>

    </div>
</body>
</html>
