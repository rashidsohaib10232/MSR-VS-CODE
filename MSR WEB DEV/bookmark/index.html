<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My BookMarks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🌐 My BookMarks</h1>
    <p class="subtitle">My Projects</p>
    <button id="theme-toggle">🌙 Toggle Dark Mode</button>
  </header>

  <main>
    <input type="text" id="search" placeholder="🔍 Search bookmarks...">
    <p id="counter"></p>

    <section class="bookmark-section">
      <div class="bookmark-container">
        <div class="bookmark-card">
          <a target="_blank" href="https://foodguardmsr.netlify.app/">🍴 Food Guard MSR</a>
        </div>
        <div class="bookmark-card">
          <a target="_blank" href="https://msrfoodguardfirst.netlify.app/">🥗 MSR Food Guard First</a>
        </div>
        <div class="bookmark-card">
          <a target="_blank" href="https://msrshophub.netlify.app/">🛒 MSR ShopHub</a>
        </div>
        <div class="bookmark-card">
          <a target="_blank" href="https://sohaib-msr.netlify.app/">📘 MSR Notes</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>Made with ❤️ by Sohaib Rashid
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
